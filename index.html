    function createRunStats() {
      return {
        roomsCleared: 0,
        coinsCollected: 0,
        enemiesDefeated: 0,
        bossesDefeated: 0,
        upgradesCollected: 0,
        roomCoins: 0,
        roomEnemies: 0
      };
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randInt(rng, min, max) {
      return Math.floor(rng() * (max - min + 1)) + min;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function dist(a, b, c, d) {
      return Math.hypot(a - c, b - d);
    }

    function chance(rng, p) {
      return rng() < p;
    }

    function pick(rng, arr) {
      return arr[Math.floor(rng() * arr.length)];
    }

    function weightedPick(rng, entries) {
      const total = entries.reduce((sum, e) => sum + e.weight, 0);
      let roll = rng() * total;
      for (const entry of entries) {
        roll -= entry.weight;
        if (roll <= 0) return entry.value;
      }
      return entries[entries.length - 1].value;
    }

    function themeForRoom(roomNumber) {
      return themes[Math.floor((roomNumber - 1) / 20) % themes.length];
    }

    function currentTheme() {
      return themeForRoom(game.roomNumber);
    }

    function difficultyFor(roomNumber) {
      return {
        enemyCount: roomNumber === 1 ? 1 : Math.min(12, 2 + Math.floor(roomNumber / 4)),
        eliteChance: Math.min(0.45, roomNumber * 0.005),
        hpMultiplier: 1 + roomNumber * 0.08,
        damageMultiplier: 1 + roomNumber * 0.035,
        speedMultiplier: 1 + Math.min(1.5, roomNumber * 0.008),
        trapCount: Math.min(10, Math.floor(roomNumber / 5) + 1),
        reward: 3 + Math.floor(roomNumber / 5)
      };
    }

    function resize() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const w = Math.max(320, Math.floor(window.innerWidth));
      const h = Math.max(300, Math.floor(window.innerHeight));
      const landscape = w > h;
      game.view.w = w;
      game.view.h = h;
      game.view.dpr = dpr;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      game.bounds.left = landscape ? 22 : 18;
      game.bounds.right = w - (landscape && h < 520 ? 96 : 18);
      game.bounds.top = landscape ? Math.max(58, Math.round(44 + Math.min(18, h * 0.03))) : Math.max(74, Math.round(62 + Math.min(22, w * 0.02)));
      game.bounds.bottom = h - (landscape ? Math.max(20, Math.round(18 + Math.min(14, h * 0.02))) : Math.max(74, Math.round(64 + Math.min(18, w * 0.02))));
      if (game.bounds.bottom - game.bounds.top < 190) {
        game.bounds.top = Math.max(48, game.bounds.top - 14);
        game.bounds.bottom = Math.min(h - 16, game.bounds.bottom + 18);
      }
      if (game.player) {
        game.player.x = clamp(game.player.x, game.bounds.left + game.player.radius, game.bounds.right - game.player.radius);
        game.player.y = clamp(game.player.y, game.bounds.top + game.player.radius, game.bounds.bottom - game.player.radius);
      }
    }

    function setState(state) {
      game.previousState = game.state;
      game.state = state;
      const gameplayVisible = state === STATES.PLAYING || state === STATES.PAUSE || state === STATES.UPGRADE_CHOICE || state === STATES.SHOP || state === STATES.GAME_OVER;
      hud.style.display = gameplayVisible && game.player ? 'block' : 'none';
      combatControls.style.display = state === STATES.PLAYING && game.player ? 'flex' : 'none';
      dashRing.style.display = state === STATES.PLAYING && game.player ? 'grid' : 'none';
      if (state === STATES.PLAYING) {
        overlay.classList.remove('visible');
        overlay.innerHTML = '';
      }
      updateHud();
    }

    function showOverlay(html) {
      overlay.innerHTML = html;
      overlay.classList.add('visible');
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1900);
    }

    function startAudio() {
      if (game.audio || game.save.permanent.settings.muted) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      try {
        game.audio = new AudioContext();
      } catch (err) {
        game.audio = null;
      }
    }

    function beep(type) {
      if (game.save.permanent.settings.muted) return;
      startAudio();
      const audio = game.audio;
      if (!audio) return;
      const map = {
        hit: [180, 0.035, 0.022],
        coin: [680, 0.025, 0.018],
        clear: [420, 0.09, 0.03],
        hurt: [90, 0.08, 0.04],
        buy: [520, 0.07, 0.025]
      };
      const [freq, dur, gain] = map[type] || map.hit;
      try {
        const osc = audio.createOscillator();
        const g = audio.createGain();
        osc.type = type === 'hurt' ? 'sawtooth' : 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(gain, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + dur);
        osc.connect(g);
        g.connect(audio.destination);
        osc.start();
        osc.stop(audio.currentTime + dur);
      } catch (err) {}
    }

    function newRun() {
      resize();
      game.runSeed = (Date.now() ^ Math.floor(Math.random() * 0x7fffffff)) >>> 0;
      game.roomNumber = 1;
      game.player = createPlayer();
      game.runStats = createRunStats();
      game.save.permanent.totalRuns += 1;
      game.save.activeRun = { exists: true };
      generateCurrentRoom();
      saveGame();
      setState(STATES.PLAYING);
      showToast('Class starts. The backpack opens.');
    }

    function continueRun() {
      const active = game.save.activeRun;
      if (!active || !active.exists) {
        showMenu();
        return;
      }
      resize();
      game.runSeed = active.runSeed >>> 0;
      game.roomNumber = Math.max(1, active.roomNumber || 1);
      game.player = restorePlayer(active.player);
      game.runStats = Object.assign(createRunStats(), active.runStats || {});
      generateCurrentRoom();
      if (active.pendingUpgrade) {
        game.room.cleared = true;
        game.room.exit.open = true;
        showUpgradeChoice();
        showToast('Upgrade choice resumed.');
      } else if (active.awaitingDoor) {
        game.room.cleared = true;
        game.room.exit.open = true;
        game.room.enemies.length = 0;
        game.clearDelay = -1;
        saveGame();
        setState(STATES.PLAYING);
        showToast('Door is open. Collect up, then leave.');
      } else {
        saveGame();
        setState(STATES.PLAYING);
        showToast('Run resumed.');
      }
    }

    function generateCurrentRoom() {
      game.projectiles.length = 0;
      game.puddles.length = 0;
      game.shopOffers = [];
      game.roomGrace = game.roomNumber <= 3 ? 2.2 : 0.8;
      game.clearDelay = -1;
      game.room = generateRoom(game.roomNumber, game.runSeed);
      game.quizTimer = game.room.modifier && game.room.modifier.id === 'quiz' ? clamp(18 - Math.floor(game.roomNumber / 18), 8, 18) : 0;
      if (game.player) {
        game.view.hpShown = clamp(game.player.hp / game.player.maxHp, 0, 1);
        game.player.x = game.bounds.left + 46;
        game.player.y = (game.bounds.top + game.bounds.bottom) / 2;
        game.player.vx = 0;
        game.player.vy = 0;
      }
      if (game.room.type === 'shop') {
        setTimeout(() => showShop(), 260);
      }
      if (game.room.type === 'treasure') {
        spawnTreasureCoins();
        game.room.cleared = true;
        game.room.exit.open = true;
        game.clearDelay = -1;
        showToast('Treasure room. Take what you want, then enter the door.');
      }
    }

    function generateRoom(roomNumber, runSeed) {
      const rng = mulberry32((runSeed + roomNumber * 99991) >>> 0);
      const theme = themeForRoom(roomNumber);
      const diff = difficultyFor(roomNumber);
      let type = roomTypeForRoom(roomNumber, rng);

      let modifier = null;
      if (type !== 'shop' && type !== 'treasure' && roomNumber > 2) {
        const chanceMod = type === 'chaos' ? 0.95 : Math.min(0.36, 0.12 + roomNumber * 0.004);
        if (chance(rng, chanceMod)) modifier = pick(rng, roomModifiers);
      }

      const room = {
        type,
        theme,
        modifier,
        obstacles: [],
        enemies: [],
        traps: [],
        coins: [],
        exit: {
          x: game.bounds.right - 26,
          y: (game.bounds.top + game.bounds.bottom) / 2,
          w: 26,
          h: 82,
          open: false
        },
        cleared: false,
        spawnedBonus: false,
        nextPreview: previewRoom(roomNumber + 1)
      };

      const obstacleBase = type === 'boss' ? 2 : type === 'treasure' ? 1 : randInt(rng, 2, 4);
      const extraMess = modifier && modifier.id === 'messy' ? 3 : 0;
      const obstacleCount = Math.min(9, obstacleBase + extraMess + Math.floor(roomNumber / 28));
      for (let i = 0; i < obstacleCount; i++) {
        const ob = makeObstacle(rng, i);
        if (ob) room.obstacles.push(ob);
      }

      if (type === 'trap' || type === 'chaos' || (modifier && (modifier.id === 'notebook' || modifier.id === 'noisy'))) {
        const extra = type === 'chaos' ? 2 : 0;
        const traps = Math.min(12, diff.trapCount + extra + (modifier && modifier.id === 'notebook' ? 2 : 0));
        for (let i = 0; i < traps; i++) room.traps.push(makeTrap(rng, i, modifier));
      }

      if (type === 'boss') {
        room.enemies.push(createEnemy('teacher', rng, diff, true));
      } else if (type !== 'shop' && type !== 'treasure') {
        const count = type === 'chaos' ? Math.min(12, diff.enemyCount + 2) : diff.enemyCount;
        for (let i = 0; i < count; i++) {
          const enemyType = chooseEnemyType(rng, roomNumber, type);
          room.enemies.push(createEnemy(enemyType, rng, diff, false));
        }
      }

      return room;
    }

    function roomTypeForRoom(roomNumber, rng) {
      if (roomNumber % 10 === 0) return 'boss';
      let type = 'normal';
      if (roomNumber > 3) {
        const roll = rng();
        if (roomNumber % 7 === 0 || roll < 0.09) type = 'shop';
        else if (roll < 0.19) type = 'treasure';
        else if (roll < 0.37) type = 'trap';
        else if (roll < 0.44) type = 'chaos';
      }
      return type;
    }

    function previewRoom(roomNumber) {
      const rng = mulberry32((game.runSeed + roomNumber * 99991) >>> 0);
      const type = roomTypeForRoom(roomNumber, rng);
      const theme = themeForRoom(roomNumber);
      return `${capitalize(type)} Room • ${theme.name}`;
    }

    function makeObstacle(rng, index) {
      const b = game.bounds;
      const w = randInt(rng, 34, 86);
      const h = randInt(rng, 24, 72);
      for (let attempt = 0; attempt < 24; attempt++) {
        const x = randInt(rng, b.left + 85, b.right - w - 75);
        const y = randInt(rng, b.top + 28, b.bottom - h - 28);
        const centerY = (b.top + b.bottom) / 2;
        if (x < b.left + 145 && Math.abs(y + h / 2 - centerY) < 78) continue;
        if (x > b.right - 135 && Math.abs(y + h / 2 - centerY) < 98) continue;
        return {
          x, y, w, h,
          kind: index % 4,
          shade: 0.8 + rng() * 0.4
        };
      }
      return null;
    }

    function makeTrap(rng, index, modifier) {
      const b = game.bounds;
      const type = modifier && modifier.id === 'notebook' && index % 2 === 0 ? 'planeHazard' : pick(rng, ['spike', 'book', 'planeHazard']);
      if (type === 'planeHazard') {
        const horizontal = chance(rng, 0.55);
        return {
          type,
          x: randInt(rng, b.left + 60, b.right - 60),
          y: randInt(rng, b.top + 40, b.bottom - 40),
          vx: horizontal ? (chance(rng, 0.5) ? 130 : -130) : 0,
          vy: horizontal ? 0 : (chance(rng, 0.5) ? 130 : -130),
          r: 10,
          damage: 4 + Math.floor(game.roomNumber / 18)
        };
      }
      return {
        type,
        x: randInt(rng, b.left + 58, b.right - 58),
        y: randInt(rng, b.top + 42, b.bottom - 42),
        r: type === 'book' ? 22 : 17,
        timer: rng() * 1.8,
        period: type === 'book' ? 2.4 + rng() * 1.2 : 1.7 + rng() * 0.9,
        active: false,
        damage: type === 'book' ? 7 + Math.floor(game.roomNumber / 14) : 5 + Math.floor(game.roomNumber / 20)
      };
    }

    function chooseEnemyType(rng, roomNumber, roomType) {
      const entries = [
        { value: 'rat', weight: Math.max(15, 46 - roomNumber * 0.2) },
        { value: 'slime', weight: 20 + roomNumber * 0.05 },
        { value: 'plane', weight: roomNumber > 2 ? 18 : 5 },
        { value: 'bot', weight: roomNumber > 5 ? 14 + roomNumber * 0.06 : 2 },
        { value: 'snake', weight: roomNumber > 8 ? 12 + roomNumber * 0.05 : 1 },
        { value: 'glue', weight: roomNumber > 12 || roomType === 'trap' ? 11 : 1 }
      ];
      return weightedPick(rng, entries);
    }

    function createEnemy(type, rng, diff, isBoss) {
      const b = game.bounds;
      let x = 0, y = 0;
      for (let i = 0; i < 30; i++) {
        x = randInt(rng, b.left + 155, b.right - 70);
        y = randInt(rng, b.top + 42, b.bottom - 42);
        if (dist(x, y, b.left + 46, (b.top + b.bottom) / 2) > 170) break;
      }
      const base = {
        rat: { name: 'Pencil Rat', hp: 7, damage: 4, speed: 93, r: 12, color: '#ff647e' },
        slime: { name: 'Eraser Slime', hp: 18, damage: 5, speed: 48, r: 17, color: '#b884ff' },
        plane: { name: 'Paper Plane', hp: 10, damage: 4, speed: 124, r: 12, color: '#f8fbff' },
        bot: { name: 'Calculator Bot', hp: 14, damage: 5, speed: 60, r: 15, color: '#55e0d6' },
        snake: { name: 'Ruler Snake', hp: 16, damage: 7, speed: 96, r: 13, color: '#ffb84a' },
        glue: { name: 'Glue Blob', hp: 20, damage: 4, speed: 52, r: 16, color: '#77f0bd' },
        teacher: { name: 'Angry Teacher', hp: 96, damage: 9, speed: 58, r: 28, color: '#ff4d6d' }
      }[type];
      const elite = !isBoss && chance(rng, diff.eliteChance);
      const hpMult = isBoss ? (1 + game.roomNumber * 0.035) : diff.hpMultiplier * (elite ? 1.65 : 1);
      const enemy = {
        type,
        name: base.name,
        x, y,
        vx: type === 'plane' || type === 'snake' ? (chance(rng, 0.5) ? 1 : -1) * base.speed : 0,
        vy: type === 'plane' || type === 'snake' ? (chance(rng, 0.5) ? 1 : -1) * base.speed * (type === 'snake' ? 0 : 0.45) : 0,
        r: base.r * (elite ? 1.15 : 1),
        hp: Math.round(base.hp * hpMult),
        maxHp: Math.round(base.hp * hpMult),
        damage: Math.max(1, Math.round(base.damage * diff.damageMultiplier * (elite ? 1.35 : 1) * (game.roomNumber === 1 ? 0.55 : game.roomNumber < 6 ? 0.72 : 1))),
        speed: base.speed * diff.speedMultiplier * (elite ? 1.12 : 1),
        color: base.color,
        elite,
        boss: isBoss,
        cooldown: rng() * 1.2,
        contactCooldown: 0,
        phase: 1,
        summonCooldown: 6,
        lineCooldown: rng() * 1.8,
        slowTimer: 0
      };
      if (isBoss && game.player && game.player.bossWeakens > 0) {
        enemy.hp = Math.round(enemy.hp * 0.72);
        enemy.maxHp = enemy.hp;
        game.player.bossWeakens -= 1;
        showToast("Principal's Pass weakened the boss.");
      }
      return enemy;
    }

    function spawnTreasureCoins() {
      const amount = 7 + Math.floor(game.roomNumber / 6);
      for (let i = 0; i < amount; i++) {
        spawnCoin(
          game.bounds.left + 120 + Math.random() * Math.max(80, game.bounds.right - game.bounds.left - 240),
          game.bounds.top + 60 + Math.random() * Math.max(80, game.bounds.bottom - game.bounds.top - 120),
          1 + Math.floor(game.roomNumber / 18)
        );
      }
    }

    function spawnCoin(x, y, value) {
      if (!game.room) return;
      game.room.coins.push({
        x, y,
        vx: (Math.random() - 0.5) * 95,
        vy: (Math.random() - 0.5) * 95,
        r: 6,
        value: Math.max(1, Math.floor(value || 1)),
        life: 0
      });
    }

    function update(dt) {
      if (!game.player || !game.room) return;
      game.noSaveUntil += dt;
      updateInputDirection();
      game.roomGrace = Math.max(0, game.roomGrace - dt);
      updatePlayer(dt);
      updateTraps(dt);
      updatePuddles(dt);
      updateEnemies(dt);
      updateProjectiles(dt);
      updateCoins(dt);
      updateParticles(dt);
      updateEffects(dt);
      updateNumbers(dt);
      updateRoomState(dt);
      updateHud();
      game.view.roomFlash = Math.max(0, game.view.roomFlash - dt * 1.8);
      if (game.view.shake > 0) {
        game.view.shake = Math.max(0, game.view.shake - dt * 15);
        const mag = game.view.shake * (game.save.permanent.settings.reducedMotion ? 0.35 : 1);
        game.view.shakeX = (Math.random() - 0.5) * mag;
        game.view.shakeY = (Math.random() - 0.5) * mag;
      } else {
        game.view.shakeX = 0;
        game.view.shakeY = 0;
      }
    }

    function updateInputDirection() {
      const keys = game.input.keys;
      let x = 0, y = 0;
      if (keys.ArrowLeft || keys.a) x -= 1;
      if (keys.ArrowRight || keys.d) x += 1;
      if (keys.ArrowUp || keys.w) y -= 1;
      if (keys.ArrowDown || keys.s) y += 1;
      if (!x && !y && (game.input.touchDirX || game.input.touchDirY)) {
        x = game.input.touchDirX;
        y = game.input.touchDirY;
      }
      const len = Math.hypot(x, y);
      if (len > 0) {
        x /= len;
        y /= len;
        game.player.facingX = x;
        game.player.facingY = y;
      }
      game.input.dirX = x;
      game.input.dirY = y;
      game.player.blocking = !!(game.input.block || keys.b || keys.Control || keys[' ' + 'Control']);
    }

    function updatePlayer(dt) {
      const p = game.player;
      p.attackCooldown = Math.max(0, p.attackCooldown - dt);
      p.shootCooldown = Math.max(0, p.shootCooldown - dt);
      p.dashCooldown = Math.max(0, p.dashCooldown - dt);
      p.invuln = Math.max(0, p.invuln - dt);
      p.slowTimer = Math.max(0, p.slowTimer - dt);

      if (p.shockwave) {
        p.shockwaveTimer -= dt;
        if (p.shockwaveTimer <= 0) {
          p.shockwaveTimer = 3.1;
          shockwave();
        }
      }

      const glueFloor = game.room.modifier && game.room.modifier.id === 'gluefloor';
      const slow = (p.slowTimer > 0 ? 0.62 : 1) * (glueFloor ? 0.82 : 1);
      const blockSlow = p.blocking ? 0.45 : 1;
      if (p.dashTime > 0) {
        p.dashTime -= dt;
        if (p.dashTrail) trailDamage();
      } else {
        const accel = p.speed * 7.5 * slow * blockSlow;
        p.vx += game.input.dirX * accel * dt;
        p.vy += game.input.dirY * accel * dt;
      }

      const friction = p.dashTime > 0 ? 0.985 : Math.pow(0.001, dt);
      p.vx *= friction;
      p.vy *= friction;
      moveCircle(p, p.vx * dt, p.vy * dt, p.radius, true);
    }

    function moveCircle(obj, dx, dy, radius, collideObstacles) {
      obj.x += dx;
      resolveBounds(obj, radius);
      if (collideObstacles) resolveObstacles(obj, radius, true);
      obj.y += dy;
      resolveBounds(obj, radius);
      if (collideObstacles) resolveObstacles(obj, radius, false);
    }

    function resolveBounds(obj, r) {
      const b = game.bounds;
      if (obj.x < b.left + r) { obj.x = b.left + r; obj.vx = Math.max(0, obj.vx || 0); }
      if (obj.x > b.right - r) { obj.x = b.right - r; obj.vx = Math.min(0, obj.vx || 0); }
      if (obj.y < b.top + r) { obj.y = b.top + r; obj.vy = Math.max(0, obj.vy || 0); }
      if (obj.y > b.bottom - r) { obj.y = b.bottom - r; obj.vy = Math.min(0, obj.vy || 0); }
    }

    function resolveObstacles(obj, r, horizontal) {
      for (const ob of game.room.obstacles) {
        if (!circleRect(obj.x, obj.y, r, ob)) continue;
        const nearestX = clamp(obj.x, ob.x, ob.x + ob.w);
        const nearestY = clamp(obj.y, ob.y, ob.y + ob.h);
        let dx = obj.x - nearestX;
        let dy = obj.y - nearestY;
        if (dx === 0 && dy === 0) {
          dx = obj.x < ob.x + ob.w / 2 ? -1 : 1;
          dy = obj.y < ob.y + ob.h / 2 ? -1 : 1;
        }
        const len = Math.max(0.001, Math.hypot(dx, dy));
        const push = r - len + 0.5;
        obj.x += (dx / len) * push;
        obj.y += (dy / len) * push;
        if (horizontal) obj.vx = 0;
        else obj.vy = 0;
      }
    }

    function circleRect(cx, cy, r, rect) {
      const nx = clamp(cx, rect.x, rect.x + rect.w);
      const ny = clamp(cy, rect.y, rect.y + rect.h);
      return (cx - nx) * (cx - nx) + (cy - ny) * (cy - ny) <= r * r;
    }

    function updateEnemies(dt) {
      const p = game.player;
      const enemies = game.room.enemies;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.cooldown = Math.max(0, e.cooldown - dt);
        e.contactCooldown = Math.max(0, e.contactCooldown - dt);
        e.slowTimer = Math.max(0, e.slowTimer - dt);
        e.hurt = Math.max(0, (e.hurt || 0) - dt);
        const dx = p.x - e.x;
        const dy = p.y - e.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        const nx = dx / d;
        const ny = dy / d;
        const quietMul = p.quiet && d > 190 ? 1 - p.quiet : 1;
        const modSpeed = game.room.modifier && game.room.modifier.id === 'exam' ? 1.16 : 1;
        const speed = e.speed * quietMul * modSpeed * (e.slowTimer > 0 ? 0.55 : 1);

        if (e.boss) {
          updateBoss(e, dt, nx, ny, d);
        } else if (e.type === 'rat' || e.type === 'slime' || e.type === 'glue') {
          e.vx += nx * speed * 4.2 * dt;
          e.vy += ny * speed * 4.2 * dt;
          if (e.type === 'glue' && e.cooldown <= 0) {
            e.cooldown = 1.45;
            addPuddle(e.x, e.y);
          }
        } else if (e.type === 'plane') {
          if (Math.abs(e.vx) + Math.abs(e.vy) < 10) {
            e.vx = (Math.random() > 0.5 ? 1 : -1) * speed;
            e.vy = (Math.random() - 0.5) * speed;
          }
        } else if (e.type === 'bot') {
          const desired = d < 140 ? -1 : d > 230 ? 1 : 0;
          e.vx += nx * speed * desired * 4.5 * dt;
          e.vy += ny * speed * desired * 4.5 * dt;
          if (e.cooldown <= 0 && d < 390) {
            e.cooldown = Math.max(0.75, 1.85 - game.roomNumber * 0.01);
            shootProjectile(e.x, e.y, nx, ny, e.damage, false, 190 + game.roomNumber * 1.2, '#58f0e0', 5, 'number');
          }
        } else if (e.type === 'snake') {
          e.lineCooldown -= dt;
          if (e.lineCooldown <= 0) {
            e.lineCooldown = 1.6 + Math.random() * 1.4;
            if (Math.abs(dx) > Math.abs(dy)) {
              e.vx = Math.sign(dx) * speed * 1.45;
              e.vy = 0;
            } else {
              e.vx = 0;
              e.vy = Math.sign(dy) * speed * 1.45;
            }
          }
        }

        const fr = e.type === 'plane' || e.type === 'snake' ? 0.995 : Math.pow(0.006, dt);
        e.vx *= fr;
        e.vy *= fr;
        moveCircle(e, e.vx * dt, e.vy * dt, e.r, e.type !== 'plane');
        if (e.type === 'plane') bounceHazard(e);

        if (game.roomGrace <= 0 && d < e.r + p.radius && e.contactCooldown <= 0) {
          e.contactCooldown = game.roomNumber < 6 ? 1.0 : 0.72;
          damagePlayer(e.damage, e.x, e.y);
        }

        if (e.hp <= 0) {
          killEnemy(i, e);
        }
      }
    }

    function updateBoss(e, dt, nx, ny, d) {
      const room = game.roomNumber;
      e.phase = e.hp < e.maxHp * 0.48 ? 2 : 1;
      const chase = e.phase === 2 ? 1.25 : 1;
      e.vx += nx * e.speed * 3.4 * chase * dt;
      e.vy += ny * e.speed * 3.4 * chase * dt;

      if (room >= 30 && e.cooldown <= 0) {
        e.cooldown = Math.max(0.62, 1.45 - room * 0.004);
        const spread = room >= 60 ? 3 : 1;
        for (let i = 0; i < spread; i++) {
          const ang = Math.atan2(ny, nx) + (i - (spread - 1) / 2) * 0.25;
          shootProjectile(e.x, e.y, Math.cos(ang), Math.sin(ang), e.damage, false, 210 + room, '#ffec99', 6, 'chalk');
        }
      }

      if (room >= 60) {
        e.summonCooldown -= dt;
        if (e.summonCooldown <= 0 && game.room.enemies.length < 10) {
          e.summonCooldown = room >= 100 ? 4.2 : 6.2;
          const rng = mulberry32((game.runSeed ^ Math.floor(performance.now()) ^ game.room.enemies.length) >>> 0);
          for (let i = 0; i < (room >= 100 ? 3 : 2); i++) {
            const minion = createEnemy(i % 2 ? 'rat' : 'plane', rng, difficultyFor(room), false);
            minion.x = e.x + (Math.random() - 0.5) * 80;
            minion.y = e.y + (Math.random() - 0.5) * 80;
            game.room.enemies.push(minion);
          }
          showToast('The teacher called on reinforcements.');
        }
      }

      if (room >= 100 && e.phase === 2 && Math.random() < dt * 1.1) {
        for (let i = 0; i < 8; i++) {
          const a = i / 8 * Math.PI * 2 + performance.now() * 0.001;
          shootProjectile(e.x, e.y, Math.cos(a), Math.sin(a), Math.ceil(e.damage * 0.7), false, 170, '#ff8faf', 4, 'chalk');
        }
      }
    }

    function killEnemy(index, e) {
      game.room.enemies.splice(index, 1);
      const coinBase = e.boss ? 14 + Math.floor(game.roomNumber / 4) : (e.elite ? 4 : 2) + Math.floor(game.roomNumber / 15);
      const value = Math.max(1, Math.floor(coinBase * game.player.coinMultiplier * (1 + game.player.rewardBonus)));
      const drops = e.boss ? 9 : e.elite ? 3 : 1 + (Math.random() < 0.28 ? 1 : 0);
      for (let j = 0; j < drops; j++) spawnCoin(e.x, e.y, Math.ceil(value / drops));
      addBurst(e.x, e.y, e.boss ? 26 : 10, e.color);
      addNumber(e.x, e.y - 12, e.boss ? 'BOSS' : '+', e.boss ? '#ffcf4a' : '#fff');
      game.runStats.enemiesDefeated += 1;
      game.runStats.roomEnemies += 1;
      game.save.permanent.enemiesDefeated += 1;
      if (e.boss) {
        game.runStats.bossesDefeated += 1;
        game.save.permanent.bossesDefeated += 1;
      }
      beep(e.boss ? 'clear' : 'hit');
      checkUnlocks();
    }

    function updateTraps(dt) {
      const traps = game.room.traps;
      for (const t of traps) {
        if (t.type === 'planeHazard') {
          t.x += t.vx * dt;
          t.y += t.vy * dt;
          bounceHazard(t);
          if (game.roomGrace <= 0 && dist(t.x, t.y, game.player.x, game.player.y) < t.r + game.player.radius) damagePlayer(t.damage, t.x, t.y);
          continue;
        }
        t.timer += dt;
        const phase = (t.timer % t.period) / t.period;
        const wasActive = t.active;
        t.active = t.type === 'book' ? phase > 0.72 : phase > 0.5;
        if (t.type === 'book' && !wasActive && t.active) addBurst(t.x, t.y, 8, '#a8c8ff');
        if (game.roomGrace <= 0 && t.active && dist(t.x, t.y, game.player.x, game.player.y) < t.r + game.player.radius) {
          damagePlayer(t.damage, t.x, t.y);
        }
      }
      if (game.room.modifier && game.room.modifier.id === 'noisy' && Math.random() < dt * 0.9) {
        const y = game.bounds.top + 30 + Math.random() * (game.bounds.bottom - game.bounds.top - 60);
        shootProjectile(game.bounds.right - 20, y, -1, (Math.random() - 0.5) * 0.35, 4 + Math.floor(game.roomNumber / 18), false, 260, '#f7eaa7', 4, 'chalk');
      }
    }

    function bounceHazard(o) {
      const b = game.bounds;
      if (o.x < b.left + o.r) { o.x = b.left + o.r; o.vx = Math.abs(o.vx); }
      if (o.x > b.right - o.r) { o.x = b.right - o.r; o.vx = -Math.abs(o.vx); }
      if (o.y < b.top + o.r) { o.y = b.top + o.r; o.vy = Math.abs(o.vy); }
      if (o.y > b.bottom - o.r) { o.y = b.bottom - o.r; o.vy = -Math.abs(o.vy); }
    }

    function addPuddle(x, y) {
      game.puddles.push({ x, y, r: 26, life: 5.2, maxLife: 5.2 });
      if (game.puddles.length > 18) game.puddles.shift();
    }

    function updatePuddles(dt) {
      for (let i = game.puddles.length - 1; i >= 0; i--) {
        const pdl = game.puddles[i];
        pdl.life -= dt;
        if (pdl.life <= 0) {
          game.puddles.splice(i, 1);
          continue;
        }
        if (dist(pdl.x, pdl.y, game.player.x, game.player.y) < pdl.r + game.player.radius) {
          game.player.slowTimer = Math.max(game.player.slowTimer, 0.45);
        }
      }
    }

    function shootProjectile(x, y, dx, dy, damage, friendly, speed, color, radius, kind) {
      const len = Math.max(0.001, Math.hypot(dx, dy));
      game.projectiles.push({
        x, y,
        vx: dx / len * speed,
        vy: dy / len * speed,
        speed,
        damage,
        friendly,
        r: radius,
        color,
        kind: kind || 'dot',
        life: 2.7,
        pierce: friendly ? Math.max(game.player.cleave ? 1 : 0, game.player.projectilePierce || 0) : 0,
        bounce: friendly ? (game.player.projectileBounce || 0) : 0,
        homing: friendly && !!game.player.projectileHoming
      });
      if (game.projectiles.length > 80) game.projectiles.splice(0, game.projectiles.length - 80);
    }

    function updateProjectiles(dt) {
      const b = game.bounds;
      for (let i = game.projectiles.length - 1; i >= 0; i--) {
        const pr = game.projectiles[i];
        pr.life -= dt;
        if (pr.homing) steerProjectileTowardEnemy(pr, dt);
        pr.x += pr.vx * dt;
        pr.y += pr.vy * dt;
        let remove = pr.life <= 0 || pr.x < b.left - 30 || pr.x > b.right + 30 || pr.y < b.top - 30 || pr.y > b.bottom + 30;
        if (!remove && pr.friendly && pr.bounce > 0) {
          let bounced = false;
          if (pr.x < b.left + pr.r) { pr.x = b.left + pr.r; pr.vx = Math.abs(pr.vx); bounced = true; }
          if (pr.x > b.right - pr.r) { pr.x = b.right - pr.r; pr.vx = -Math.abs(pr.vx); bounced = true; }
          if (pr.y < b.top + pr.r) { pr.y = b.top + pr.r; pr.vy = Math.abs(pr.vy); bounced = true; }
          if (pr.y > b.bottom - pr.r) { pr.y = b.bottom - pr.r; pr.vy = -Math.abs(pr.vy); bounced = true; }
          if (bounced) {
            pr.bounce -= 1;
            pr.life = Math.max(pr.life, 0.7);
            addBurst(pr.x, pr.y, 4, pr.color);
          }
        }
        if (!remove) {
          for (const ob of game.room.obstacles) {
            if (circleRect(pr.x, pr.y, pr.r, ob)) {
              remove = true;
              break;
            }
          }
        }
        if (!remove && pr.friendly) {
          for (const e of game.room.enemies) {
            if (dist(pr.x, pr.y, e.x, e.y) < pr.r + e.r) {
              hitEnemy(e, pr.damage, pr.x, pr.y, pr.vx, pr.vy, true);
              if (pr.pierce > 0) pr.pierce -= 1;
              else remove = true;
              break;
            }
          }
      } else if (!remove && game.roomGrace <= 0 && dist(pr.x, pr.y, game.player.x, game.player.y) < pr.r + game.player.radius) {
          damagePlayer(pr.damage, pr.x, pr.y);
          remove = true;
        }
        if (remove) game.projectiles.splice(i, 1);
      }
    }

    function steerProjectileTowardEnemy(pr, dt) {
      let best = null;
      let bestScore = Infinity;
      for (const e of game.room.enemies) {
        const dx = e.x - pr.x;
        const dy = e.y - pr.y;
        const d = Math.hypot(dx, dy);
        if (d > 260 || d < 1) continue;
        const dot = (dx * pr.vx + dy * pr.vy) / (d * Math.max(1, Math.hypot(pr.vx, pr.vy)));
        if (dot < -0.15) continue;
        const score = d * (1.35 - dot);
        if (score < bestScore) {
          bestScore = score;
          best = { dx, dy, d };
        }
      }
      if (!best) return;
      const speed = Math.max(1, pr.speed || Math.hypot(pr.vx, pr.vy));
      const tx = best.dx / best.d * speed;
      const ty = best.dy / best.d * speed;
      const turn = clamp(dt * 4.2, 0, 0.14);
      pr.vx += (tx - pr.vx) * turn;
      pr.vy += (ty - pr.vy) * turn;
    }

    function updateCoins(dt) {
      const p = game.player;
      const magnet = p.coinMagnet + 54;
      for (let i = game.room.coins.length - 1; i >= 0; i--) {
        const c = game.room.coins[i];
        c.life += dt;
        const dx = p.x - c.x;
        const dy = p.y - c.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        if (d < magnet) {
          const pull = (1 - d / magnet) * 680;
          c.vx += dx / d * pull * dt;
          c.vy += dy / d * pull * dt;
        }
        c.vx *= Math.pow(0.04, dt);
        c.vy *= Math.pow(0.04, dt);
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.x = clamp(c.x, game.bounds.left + c.r, game.bounds.right - c.r);
        c.y = clamp(c.y, game.bounds.top + c.r, game.bounds.bottom - c.r);
        if (d < p.radius + c.r + 8) {
          collectCoin(i, c);
        }
      }
    }

    function collectCoin(index, coin) {
      game.room.coins.splice(index, 1);
      game.player.coins += coin.value;
      game.runStats.coinsCollected += coin.value;
      game.runStats.roomCoins += coin.value;
      game.save.permanent.totalCoins += coin.value;
      addNumber(coin.x, coin.y - 10, '+' + coin.value, '#ffdc58');
      addBurst(coin.x, coin.y, 5, '#ffdc58');
      beep('coin');
      checkUnlocks();
    }

    function updateRoomState(dt) {
      const room = game.room;
      if (!room.cleared && room.enemies.length === 0 && room.type !== 'shop') {
        room.cleared = true;
        room.exit.open = true;
        game.runStats.roomsCleared += 1;
        if (game.quizTimer > 0) {
          const bonus = 5 + Math.floor(game.roomNumber / 8);
          game.player.coins += bonus;
          game.runStats.coinsCollected += bonus;
          game.save.permanent.totalCoins += bonus;
          showToast('Pop quiz bonus +' + bonus + ' coins');
        }
        const reward = Math.max(1, Math.floor((difficultyFor(game.roomNumber).reward) * (1 + game.player.rewardBonus)));
        for (let i = 0; i < Math.min(10, 2 + Math.floor(reward / 2)); i++) {
          spawnCoin(room.exit.x - 52 + Math.random() * 34, room.exit.y - 35 + Math.random() * 70, Math.ceil(reward / 4));
        }
        addBurst(room.exit.x, room.exit.y, 18, currentTheme().accent);
        addRing((game.bounds.left + game.bounds.right) / 2, (game.bounds.top + game.bounds.bottom) / 2, Math.min(game.bounds.right - game.bounds.left, game.bounds.bottom - game.bounds.top) * 0.42, currentTheme().accent, 0.75);
        game.view.roomFlash = 1;
        beep('clear');
        showToast('Door opened. Grab the coins, then enter.');
        saveGame();
        game.clearDelay = -1;
      }

      if (game.quizTimer > 0 && !room.cleared) game.quizTimer = Math.max(0, game.quizTimer - dt);

      if (room.cleared && room.exit.open && game.state === STATES.PLAYING) {
        const ex = room.exit;
        if (game.player.x > ex.x - 12 && Math.abs(game.player.y - ex.y) < ex.h / 2 + 8) {
          showUpgradeChoice();
        }
      }
    }

    function damagePlayer(amount, sourceX, sourceY) {
      const p = game.player;
      if (p.invuln > 0) return;
      if (Math.random() < p.dodgeChance) {
        addNumber(p.x, p.y - 22, 'DODGE', '#b8f7ff');
        p.invuln = 0.18;
        return;
      }
      let dmg = amount;
      if (p.blocking) dmg *= (1 - p.blockStrength);
      dmg = Math.max(1, Math.round(dmg));
      p.hp -= dmg;
      p.invuln = p.blocking ? 0.34 : 0.62;
      const dx = p.x - sourceX;
      const dy = p.y - sourceY;
      const d = Math.max(1, Math.hypot(dx, dy));
      p.vx += dx / d * 170;
      p.vy += dy / d * 170;
      game.view.shake = Math.max(game.view.shake, p.blocking ? 4 : 9);
      addNumber(p.x, p.y - 24, '-' + dmg, p.blocking ? '#8fc7ff' : '#ff6b82');
      addBurst(p.x, p.y, p.blocking ? 5 : 12, p.blocking ? '#8fc7ff' : '#ff4d6d');
      beep('hurt');
      if (p.hp <= 0) gameOver();
    }

    function attackAt(x, y) {
      const p = game.player;
      if (!p || p.attackCooldown > 0 || game.state !== STATES.PLAYING) return false;
      let target = null;
      let best = Infinity;
      for (const e of game.room.enemies) {
        const d = dist(x, y, e.x, e.y);
        const fromPlayer = dist(p.x, p.y, e.x, e.y);
        if (d < e.r + 26 && fromPlayer <= p.attackRange + e.r && d < best) {
          best = d;
          target = e;
        }
      }
      if (!target) {
        target = nearestEnemyInRange(p.attackRange + 14);
      }
      if (!target) return false;
      performAttack(target);
      return true;
    }

    function nearestEnemyInRange(range) {
      const p = game.player;
      let target = null;
      let best = Infinity;
      for (const e of game.room.enemies) {
        const d = dist(p.x, p.y, e.x, e.y) - e.r;
        if (d < range && d < best) {
          target = e;
          best = d;
        }
      }
      return target;
    }

    function performAttack(target) {
      const p = game.player;
      p.attackCooldown = p.attackCooldownBase;
      p.attacksMade += 1;
      const dx = target.x - p.x;
      const dy = target.y - p.y;
      const d = Math.max(1, Math.hypot(dx, dy));
      p.facingX = dx / d;
      p.facingY = dy / d;
      let damage = p.damage;
      let crit = Math.random() < p.critChance;
      if (p.examMode && p.attacksMade % 10 === 0) crit = true;
      if (crit) damage *= 2;

      if (p.cleave) {
        for (const e of game.room.enemies) {
          if (dist(p.x, p.y, e.x, e.y) <= p.attackRange + e.r) {
            hitEnemy(e, damage, e.x, e.y, e.x - p.x, e.y - p.y, crit);
          }
        }
      } else {
        hitEnemy(target, damage, target.x, target.y, dx, dy, crit);
      }

      if (p.projectileEnabled) {
        const count = Math.max(1, p.projectileCount);
        for (let i = 0; i < count; i++) {
          const spread = (i - (count - 1) / 2) * 0.16;
          const a = Math.atan2(p.facingY, p.facingX) + spread;
          shootProjectile(p.x + Math.cos(a) * 16, p.y + Math.sin(a) * 16, Math.cos(a), Math.sin(a), Math.max(1, Math.round(p.damage * 0.58)), true, 310, '#d7f2ff', 4, 'pencil');
        }
      }

      game.view.shake = Math.max(game.view.shake, crit ? 5 : 2.5);
      game.hitstop = Math.max(game.hitstop, crit ? 0.045 : 0.022);
      addSlash(p.x + p.facingX * 28, p.y + p.facingY * 28, Math.atan2(p.facingY, p.facingX), p.attackRange * 0.58, crit ? '#ffcf4a' : '#c6f4ff', p.cleave);
      addBurst(target.x, target.y, crit ? 15 : 8, crit ? '#ffcf4a' : '#c6f4ff');
      beep('hit');
    }

    function shootPlayerProjectile(targetX, targetY) {
      const p = game.player;
      if (!p || game.state !== STATES.PLAYING || p.shootCooldown > 0) return false;
      let dx = 0;
      let dy = 0;
      if (Number.isFinite(targetX) && Number.isFinite(targetY)) {
        dx = targetX - p.x;
        dy = targetY - p.y;
      } else {
        const target = findShootAssistTarget();
        if (target) {
          dx = target.x - p.x;
          dy = target.y - p.y;
        } else {
          dx = game.input.dirX || p.facingX || 1;
          dy = game.input.dirY || p.facingY || 0;
        }
      }
      const len = Math.max(1, Math.hypot(dx, dy));
      dx /= len;
      dy /= len;
      p.facingX = dx;
      p.facingY = dy;
      p.shootCooldown = p.shootCooldownBase;
      const count = p.projectileEnabled ? Math.max(1, p.projectileCount) : 1;
      const baseDamage = Math.max(2, Math.round(p.damage * (p.projectileEnabled ? 0.62 : 0.48)));
      for (let i = 0; i < count; i++) {
        const spread = (i - (count - 1) / 2) * (p.projectileEnabled ? 0.15 : 0);
        const a = Math.atan2(dy, dx) + spread;
        shootProjectile(p.x + Math.cos(a) * 20, p.y + Math.sin(a) * 20, Math.cos(a), Math.sin(a), baseDamage, true, 360, '#ffd45d', 4.5, 'pencil');
      }
      addSlash(p.x + dx * 20, p.y + dy * 20, Math.atan2(dy, dx), 18, '#ffd45d', false);
      addBurst(p.x + dx * 16, p.y + dy * 16, 5, '#ffd45d');
      game.view.shake = Math.max(game.view.shake, 1.5);
      beep('hit');
      return true;
    }

    function findShootAssistTarget() {
      const p = game.player;
      if (!game.room || !game.room.enemies.length) return null;
      const aimX = game.input.dirX || p.facingX || 1;
      const aimY = game.input.dirY || p.facingY || 0;
      const hasManualAim = Math.hypot(game.input.dirX, game.input.dirY) > 0.1;
      let best = null;
      let bestScore = Infinity;
      for (const e of game.room.enemies) {
        const dx = e.x - p.x;
        const dy = e.y - p.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        if (d > 540) continue;
        const dot = (dx / d) * aimX + (dy / d) * aimY;
        if (hasManualAim && dot < 0.42) continue;
        const score = hasManualAim ? d * (1.22 - dot) : d;
        if (score < bestScore) {
          bestScore = score;
          best = e;
        }
      }
      return best;
    }

    function hitEnemy(e, damage, x, y, kx, ky, special) {
      const p = game.player;
      const dmg = Math.max(1, Math.round(damage));
      e.hp -= dmg;
      e.hurt = 0.13;
      const d = Math.max(1, Math.hypot(kx, ky));
      e.vx += kx / d * p.knockback;
      e.vy += ky / d * p.knockback;
      e.slowTimer = Math.max(e.slowTimer, special === true ? 0.15 : 0);
      addNumber(x, y - e.r, String(dmg), special ? '#ffcf4a' : '#f2fbff');
      if (p.lifeSteal > 0) p.hp = Math.min(p.maxHp, p.hp + dmg * p.lifeSteal);
    }

    function dash() {
      const p = game.player;
      if (!p || p.dashCooldown > 0 || game.state !== STATES.PLAYING) return;
      let x = game.input.dirX || p.facingX || 1;
      let y = game.input.dirY || p.facingY || 0;
      const len = Math.max(1, Math.hypot(x, y));
      x /= len;
      y /= len;
      p.vx = x * p.dashPower;
      p.vy = y * p.dashPower;
      p.dashTime = 0.15;
      p.dashCooldown = p.dashCooldownBase;
      p.invuln = Math.max(p.invuln, 0.14);
      addBurst(p.x, p.y, 12, '#32d5ff');
      addRing(p.x, p.y, 34, '#32d5ff', 0.22);
      beep('hit');
    }

    function shockwave() {
      const p = game.player;
      addBurst(p.x, p.y, 36, '#7af7ff');
      addRing(p.x, p.y, 122, '#7af7ff', 0.45);
      for (const e of game.room.enemies) {
        const d = dist(p.x, p.y, e.x, e.y);
        if (d < 122) hitEnemy(e, Math.max(3, p.damage * 0.8), e.x, e.y, e.x - p.x, e.y - p.y, true);
      }
    }

    function trailDamage() {
      const p = game.player;
      if (Math.random() < 0.38) addParticle(p.x, p.y, '#52ddff', 16, 0.4);
      for (const e of game.room.enemies) {
        if (dist(p.x, p.y, e.x, e.y) < p.radius + e.r + 8) {
          e.hp -= 0.35 + p.damage * 0.03;
          e.slowTimer = Math.max(e.slowTimer, 0.25);
        }
      }
    }

    function addParticle(x, y, color, speed, life) {
      if (game.save && game.save.permanent.settings.reducedMotion && game.particles.length > 55) return;
      game.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * speed,
        vy: (Math.random() - 0.5) * speed,
        r: 2 + Math.random() * 3,
        color,
        life,
        maxLife: life
      });
      if (game.particles.length > 170) game.particles.splice(0, game.particles.length - 170);
    }

    function addBurst(x, y, count, color) {
      const reduced = game.save && game.save.permanent.settings.reducedMotion;
      const n = reduced ? Math.ceil(count * 0.35) : count;
      for (let i = 0; i < n; i++) addParticle(x, y, color, 60 + Math.random() * 160, 0.35 + Math.random() * 0.35);
    }

    function addSlash(x, y, angle, radius, color, wide) {
      if (game.save && game.save.permanent.settings.reducedMotion && game.effects.length > 12) return;
      game.effects.push({
        type: 'slash',
        x, y, angle,
        radius,
        color,
        wide: !!wide,
        life: 0.18,
        maxLife: 0.18
      });
      if (game.effects.length > 36) game.effects.splice(0, game.effects.length - 36);
    }

    function addRing(x, y, radius, color, life) {
      game.effects.push({
        type: 'ring',
        x, y,
        radius,
        color,
        life,
        maxLife: life
      });
      if (game.effects.length > 36) game.effects.splice(0, game.effects.length - 36);
    }

    function updateParticles(dt) {
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.03, dt);
        p.vy *= Math.pow(0.03, dt);
        if (p.life <= 0) game.particles.splice(i, 1);
      }
    }

    function updateEffects(dt) {
      for (let i = game.effects.length - 1; i >= 0; i--) {
        const e = game.effects[i];
        e.life -= dt;
        if (e.life <= 0) game.effects.splice(i, 1);
      }
    }

    function addNumber(x, y, text, color) {
      game.numbers.push({ x, y, text, color, life: 0.72, maxLife: 0.72, vy: -36 });
      if (game.numbers.length > 60) game.numbers.shift();
    }

    function updateNumbers(dt) {
      for (let i = game.numbers.length - 1; i >= 0; i--) {
        const n = game.numbers[i];
        n.life -= dt;
        n.y += n.vy * dt;
        if (n.life <= 0) game.numbers.splice(i, 1);
      }
    }

    function showUpgradeChoice() {
      if (!game.player) return;
      setState(STATES.UPGRADE_CHOICE);
      game.choices = generateUpgradeChoices(game.player.extraChoices ? 4 : 3);
      saveGame();
      const summary = [
        ['Room', game.roomNumber],
        ['Coins gained', game.runStats.roomCoins || 0],
        ['HP', Math.ceil(game.player.hp) + ' / ' + game.player.maxHp],
        ['Enemies', game.runStats.roomEnemies || 0]
      ];
      const cards = game.choices.map((u, i) => `
        <button class="upgrade-card ${u.rarity}" data-choice="${i}">
          <div class="card-top">
            <div>
              <div class="rarity">${u.rarity}</div>
              <h3>${escapeHtml(u.name)}</h3>
            </div>
            <div class="icon">${escapeHtml(u.icon)}</div>
          </div>
          <p class="card-desc">${escapeHtml(u.desc)}</p>
          <div class="stat-preview">${escapeHtml(previewUpgrade(u))}</div>
        </button>
      `).join('');
      showOverlay(`
        <section class="screen wide">
          <div class="screen-header">
            <div>
              <h2>Room ${game.roomNumber} cleared</h2>
              <p class="muted">Choose one thing to stuff into the backpack.</p>
            </div>
          </div>
          <div class="summary-grid">${summary.map(([a,b]) => `<div class="stat-card"><div class="muted">${a}</div><div class="stat-value">${b}</div></div>`).join('')}</div>
          <div class="card-grid three">${cards}</div>
        </section>
      `);
      overlay.querySelectorAll('[data-choice]').forEach(btn => {
        btn.addEventListener('click', () => {
          btn.classList.add('selected');
          setTimeout(() => chooseUpgrade(Number(btn.dataset.choice)), game.save.permanent.settings.reducedMotion ? 10 : 110);
        });
      });
      game.runStats.roomCoins = 0;
      game.runStats.roomEnemies = 0;
    }

    function generateUpgradeChoices(count) {
      const rng = mulberry32((game.runSeed + game.roomNumber * 1777 + game.player.upgrades.length * 8191) >>> 0);
      const available = upgrades.slice();
      const result = [];
      for (let i = 0; i < count && available.length; i++) {
        const rarity = weightedPick(rng, [
          { value: 'common', weight: Math.max(52, 72 - game.roomNumber * 0.12) },
          { value: 'rare', weight: 24 + Math.min(10, game.roomNumber * 0.05) },
          { value: 'legendary', weight: 4 + Math.min(7, game.roomNumber * 0.025) }
        ]);
        let pool = available.filter(u => u.rarity === rarity);
        if (!pool.length) pool = available;
        const chosen = pick(rng, pool);
        result.push(chosen);
        available.splice(available.indexOf(chosen), 1);
      }
      return result;
    }

    function previewUpgrade(upgrade) {
      const map = {
        damage: 'Damage +1',
        hp: 'Max HP +5',
        heal: 'Heal +10',
        speed: 'Speed +5%',
        knockback: 'Knockback up',
        grip: 'Faster attacks',
        dodge: 'Dodge +7%',
        ruler: 'Wider melee',
        dash: 'Dash cooldown down',
        projectile: 'Pencil shots',
        quickDraw: 'Shoot cooldown down',
        pierceShot: 'Piercing shots',
        ricochet: 'Wall bounce',
        cheat: 'Rewards up',
        magnet: 'Magnet range up',
        quiet: 'Stealth up',
        examMode: 'Timed crits',
        meat: 'Huge HP',
        pass: 'Next boss weaker',
        notebook: '4 choices',
        goldPack: 'Coin scaling',
        bell: 'Auto shockwave',
        hallPass: 'Dash trail',
        splitGraphite: 'More shots',
        eraserGuidance: 'Soft homing'
      };
      return map[upgrade.id] || upgrade.rarity;
    }

    function chooseUpgrade(index) {
      const u = game.choices[index];
      if (!u || !game.player) return;
      u.apply(game);
      game.player.upgrades.push(u.id);
      game.runStats.upgradesCollected += 1;
      addBurst(game.player.x, game.player.y, 24, u.rarity === 'legendary' ? '#ffcf4a' : u.rarity === 'rare' ? '#8fc7ff' : '#dbeaff');
      showToast(u.name);
      beep('buy');
      advanceRoom();
    }

    function advanceRoom() {
      game.roomNumber += 1;
      game.save.permanent.bestRoom = Math.max(game.save.permanent.bestRoom, game.roomNumber);
      if (game.player.goldenBackpack) game.player.coinMultiplier = Math.min(3.5, game.player.coinMultiplier + 0.015);
      generateCurrentRoom();
      saveGame();
      checkUnlocks();
      setState(STATES.PLAYING);
    }

    function showShop() {
      if (game.state !== STATES.PLAYING && game.state !== STATES.SHOP) return;
      game.room.cleared = true;
      game.room.exit.open = true;
      if (!game.shopOffers.length || game.state !== STATES.SHOP) game.shopOffers = generateShopOffers();
      setState(STATES.SHOP);
      const offers = game.shopOffers.map((o, i) => `
        <div class="shop-card">
          <div class="card-top">
            <div>
              <div class="rarity">${escapeHtml(o.kind)}</div>
              <h3>${escapeHtml(o.name)}</h3>
            </div>
            <div class="icon">${escapeHtml(o.icon)}</div>
          </div>
          <p class="card-desc">${escapeHtml(o.desc)}</p>
          <div class="cost">${o.cost} coins</div>
          <button class="tiny-button" data-buy="${i}" ${game.player.coins < o.cost || o.bought ? 'disabled' : ''}>Buy</button>
        </div>
      `).join('');
      showOverlay(`
        <section class="screen wide">
          <div class="screen-header">
            <div>
              <h2>Desk Shop</h2>
              <p class="muted">Spend coins before the bell rings.</p>
            </div>
            <div class="pill">${game.player.coins} coins</div>
          </div>
          <div class="card-grid three">${offers}</div>
          <div class="menu-grid">
            <button id="leaveShop" class="primary-button">Leave Shop</button>
          </div>
        </section>
      `);
      overlay.querySelectorAll('[data-buy]').forEach(btn => {
        btn.addEventListener('click', () => buyOffer(Number(btn.dataset.buy)));
      });
      document.getElementById('leaveShop').addEventListener('click', () => showUpgradeChoice());
      saveGame();
    }

    function generateShopOffers() {
      const rng = mulberry32((game.runSeed + game.roomNumber * 55441) >>> 0);
      const base = 7 + Math.floor(game.roomNumber / 5);
      const offers = [
        { kind: 'heal', name: 'Cafeteria Snack', icon: '●', desc: 'Heal 18 HP.', cost: base, apply: () => { game.player.hp = Math.min(game.player.maxHp, game.player.hp + 18); } },
        { kind: 'stat', name: 'Sturdy Folder', icon: '▣', desc: '+4 max HP and heal 4.', cost: base + 4, apply: () => { game.player.maxHp += 4; game.player.hp += 4; } },
        { kind: 'stat', name: 'Fresh Pencil Tip', icon: '✎', desc: '+1 attack damage.', cost: base + 7, apply: () => { game.player.damage += 1; } },
        { kind: 'upgrade', name: 'Mystery Pocket', icon: '?', desc: 'Gain a random upgrade now.', cost: base + 12, apply: () => { const u = pick(rng, generateUpgradeChoices(3)); u.apply(game); game.player.upgrades.push(u.id); game.runStats.upgradesCollected += 1; showToast('Bought ' + u.name); } },
        { kind: 'route', name: 'Hall Monitor Tip', icon: '!', desc: 'Weaken the next boss.', cost: base + 10, apply: () => { game.player.bossWeakens += 1; } }
      ];
      const result = [];
      while (result.length < 3 && offers.length) {
        const o = offers.splice(randInt(rng, 0, offers.length - 1), 1)[0];
        result.push(Object.assign({ bought: false }, o));
      }
      return result;
    }

    function buyOffer(index) {
      const offer = game.shopOffers[index];
      if (!offer || offer.bought || game.player.coins < offer.cost) return;
      game.player.coins -= offer.cost;
      offer.bought = true;
      offer.apply();
      beep('buy');
      saveGame();
      showShop();
    }

    function gameOver() {
      const reached = game.roomNumber;
      game.save.permanent.bestRoom = Math.max(game.save.permanent.bestRoom, reached);
      game.save.permanent.totalDeaths += 1;
      checkUnlocks();
      const stats = Object.assign({}, game.runStats);
      clearActiveRun();
      setState(STATES.GAME_OVER);
      showOverlay(`
        <section class="screen">
          <div class="title-block">
            <h2>Backpack closed</h2>
            <p class="subtitle">You reached room ${reached}.</p>
          </div>
          <div class="summary-grid">
            ${statTile('Best room', game.save.permanent.bestRoom, true)}
            ${statTile('Coins', stats.coinsCollected, true)}
            ${statTile('Enemies', stats.enemiesDefeated, true)}
            ${statTile('Bosses', stats.bossesDefeated, true)}
            ${statTile('Upgrades', stats.upgradesCollected, true)}
            ${statTile('Deaths', game.save.permanent.totalDeaths, true)}
          </div>
          <div class="menu-grid">
            <button id="newRunGameOver" class="primary-button">New Run</button>
            <button id="menuGameOver" class="secondary-button">Main Menu</button>
          </div>
        </section>
      `);
      animateStatCards();
      document.getElementById('newRunGameOver').addEventListener('click', newRun);
      document.getElementById('menuGameOver').addEventListener('click', showMenu);
    }

    function statTile(label, value, countUp) {
      const numeric = Number.isFinite(Number(value));
      const shouldCount = countUp && numeric;
      return `<div class="stat-card"><div class="muted">${escapeHtml(label)}</div><div class="stat-value" ${shouldCount ? `data-count="${Number(value)}"` : ''}>${shouldCount ? 0 : value}</div></div>`;
    }

    function animateStatCards() {
      if (game.save && game.save.permanent.settings.reducedMotion) {
        overlay.querySelectorAll('[data-count]').forEach(el => { el.textContent = el.dataset.count; });
        return;
      }
      const start = performance.now();
      const nodes = Array.from(overlay.querySelectorAll('[data-count]'));
      function tick(now) {
        const p = clamp((now - start) / 520, 0, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        for (const el of nodes) {
          const target = Number(el.dataset.count || 0);
          el.textContent = Math.round(target * eased);
        }
        if (p < 1 && overlay.classList.contains('visible')) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function checkUnlocks() {
      const p = game.save.permanent;
      const unlocks = [
        ['hoodie', p.bestRoom >= 20],
        ['exam', p.bestRoom >= 50],
        ['cafeteria', p.enemiesDefeated >= 100],
        ['wizard', p.totalDeaths >= 10],
        ['golden', p.totalCoins >= 1000 || p.bestRoom >= 100 || p.bossesDefeated >= 10]
      ];
      let changed = false;
      for (const [id, ok] of unlocks) {
        if (ok && !p.unlockedSkins.includes(id)) {
          p.unlockedSkins.push(id);
          changed = true;
          const skin = skins.find(s => s.id === id);
          showToast('Skin unlocked: ' + skin.name);
        }
      }
      if (changed) saveGame();
    }

    function showMenu() {
      setState(STATES.MENU);
      const hasContinue = game.save.activeRun && game.save.activeRun.exists;
      showOverlay(`
        <section class="screen menu-screen">
          <div class="title-block">
            <h1>Backpack Dungeon</h1>
            <p class="subtitle">How deep can your backpack go?</p>
          </div>
          <div class="pill-row">
            <span class="pill">Best room ${game.save.permanent.bestRoom}</span>

    function showPause() {
      if (!game.player || ![STATES.PLAYING, STATES.PAUSE, STATES.SETTINGS].includes(game.state)) return;
      saveGame();
      setState(STATES.PAUSE);
      showOverlay(`
        <section class="screen">

              <h2>Paused</h2>

      document.getElementById('pauseSettingsBtn').addEventListener('click', () => showSettings(STATES.PAUSE));

    function showStats() {
      setState(STATES.STATS);
      const p = game.save.permanent;
      showOverlay(`
        <section class="screen">
          <div class="screen-header">
            <h2>Stats</h2>
            <button id="backStats" class="tiny-button">Back</button>
          </div>
          <div class="summary-grid">
            ${statTile('Best room', p.bestRoom)}
            ${statTile('Total deaths', p.totalDeaths)}
            ${statTile('Total coins', p.totalCoins)}
            ${statTile('Enemies', p.enemiesDefeated)}
            ${statTile('Bosses', p.bossesDefeated)}
            ${statTile('Runs', p.totalRuns)}

            <div class="muted">Unlocked skins</div>

      document.getElementById('backStats').addEventListener('click', showMenu);

    function showSkins() {
      setState(STATES.SKINS);
      const p = game.save.permanent;
      const cards = skins.map(s => {
        const unlocked = p.unlockedSkins.includes(s.id);
        const selected = p.selectedSkin === s.id;
        return `
          <div class="skin-card">
            <div class="card-top">
              <div>
                <div class="rarity">${selected ? 'selected' : unlocked ? 'unlocked' : 'locked'}</div>

              </div>
              <div class="skin-preview" aria-hidden="true">
                <span class="pack" style="background:${s.colors[1]}"></span>
                <span class="body" style="background:${s.colors[0]}"></span>
                <span class="head"></span>
                <span class="eye"></span>
              </div>
            </div>
            <p class="card-desc">${escapeHtml(unlocked ? 'Ready for class.' : s.unlock)}</p>
            <button class="tiny-button" data-skin="${s.id}" ${!unlocked || selected ? 'disabled' : ''}>${selected ? 'Selected' : unlocked ? 'Select' : 'Locked'}</button>
          </div>
        `;
      }).join('');
      showOverlay(`
        <section class="screen wide">
          <div class="screen-header">
            <h2>Skins</h2>
            <button id="backSkins" class="tiny-button">Back</button>

          <div class="card-grid two">${cards}</div>

      document.getElementById('backSkins').addEventListener('click', showMenu);
      overlay.querySelectorAll('[data-skin]').forEach(btn => {
        btn.addEventListener('click', () => {
          p.selectedSkin = btn.dataset.skin;
          game.selectedSkin = p.selectedSkin;
          saveGame();
          showSkins();
        });
      });

    function showSettings(backState) {
      const from = backState || STATES.MENU;
      setState(STATES.SETTINGS);
      const s = game.save.permanent.settings;
      showOverlay(`
        <section class="screen">
          <div class="screen-header">
            <h2>Settings</h2>
            <button id="backSettings" class="tiny-button">Back</button>
          </div>
          <div class="stack">
            <div class="settings-row">
              <div>
                <h3>Mute</h3>
                <p class="muted">Sound is off by default.</p>
              </div>
              <button id="muteToggle" class="toggle ${s.muted ? 'on' : ''}" aria-label="Mute"><span></span></button>
            </div>
            <div class="settings-row">
              <div>
                <h3>Reduced Motion</h3>
                <p class="muted">Fewer particles and softer shake.</p>
              </div>
              <button id="motionToggle" class="toggle ${s.reducedMotion ? 'on' : ''}" aria-label="Reduced motion"><span></span></button>
            </div>
            <div class="stat-card">
              <h3>Controls</h3>
              <p class="card-desc">Mobile: swipe move, tap enemies to attack, Shoot button fires a pencil shot, Dash button or double tap dashes, hold block. Desktop: WASD/arrows move, Space attack, F/E shoot, Shift dash, B block, Esc pause.</p>
            </div>
            <button id="resetSettingsSave" class="danger-button">Reset Save</button>
          </div>
        </section>
      `);
      document.getElementById('backSettings').addEventListener('click', () => {

        else showMenu();
      });
      document.getElementById('muteToggle').addEventListener('click', () => {
        s.muted = !s.muted;
        saveGame();
        showSettings(from);
      });
      document.getElementById('motionToggle').addEventListener('click', () => {
        s.reducedMotion = !s.reducedMotion;
        saveGame();
        showSettings(from);

      document.getElementById('resetSettingsSave').addEventListener('click', deleteSave);
