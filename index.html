    function deleteSave() {
      if (!confirm('Delete all Backpack Dungeon save data?')) return;
      localStorage.removeItem(STORAGE_KEY);
      loadSave();
      game.player = null;
      game.room = null;
      showMenu();
    }

    function draw() {
      ctx.save();
      ctx.setTransform(game.view.dpr, 0, 0, game.view.dpr, game.view.shakeX * game.view.dpr, game.view.shakeY * game.view.dpr);
      drawBackground();
      if (game.room && game.player) {
        drawRoom();
        drawPuddles();
        drawTraps();
        drawCoins();
        drawProjectiles();
        drawEffects();
        drawEnemies();
        drawPlayer();
        drawParticles();
        drawNumbers();
        if (game.room.modifier && game.room.modifier.id === 'dark') drawDarkness();
      } else {
        drawMenuBackdrop();
      }
      ctx.restore();
    }

    function drawBackground() {
      const theme = game.room ? game.room.theme : themes[0];
      const t = performance.now() * 0.001;
      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, game.view.w, game.view.h);
      const drift = game.save && game.save.permanent.settings.reducedMotion ? 0 : Math.sin(t * 0.32) * 18;
      const grad = ctx.createRadialGradient(game.view.w * 0.25 + drift, game.view.h * 0.05, 0, game.view.w * 0.25, game.view.h * 0.05, Math.max(game.view.w, game.view.h) * 0.8);
      grad.addColorStop(0, hexToRgba(theme.accent, 0.2));
      grad.addColorStop(0.42, hexToRgba(theme.floor, 0.16));
      grad.addColorStop(1, 'rgba(0,0,0,0.38)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, game.view.w, game.view.h);

      const grad2 = ctx.createRadialGradient(game.view.w * 0.86 - drift, game.view.h * 0.24, 0, game.view.w * 0.86, game.view.h * 0.24, game.view.w * 0.78);
      grad2.addColorStop(0, hexToRgba(theme.accent2 || theme.accent, 0.12));
      grad2.addColorStop(0.55, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad2;
      ctx.fillRect(0, 0, game.view.w, game.view.h);
    }

    function drawMenuBackdrop() {
      const t = performance.now() * 0.001;
      const reduced = game.save && game.save.permanent.settings.reducedMotion;
      for (let i = 0; i < 28; i++) {
        const speed = reduced ? 0 : t;
        const x = (i * 79 + Math.sin(speed * 0.8 + i) * 18 + game.view.w) % game.view.w;
        const y = (i * 131 + Math.cos(speed * 0.55 + i) * 16 + game.view.h) % game.view.h;
        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.translate(x, y);
        ctx.rotate((i % 7) * 0.45 + t * 0.05);
        ctx.fillStyle = i % 3 === 0 ? 'rgba(56,215,255,0.22)' : i % 3 === 1 ? 'rgba(255,212,93,0.18)' : 'rgba(208,134,255,0.16)';
        roundRect(ctx, -22, -4, 44 + (i % 3) * 14, 8, 4);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawRoom() {
      const b = game.bounds;
      const theme = game.room.theme;
      ctx.save();
      ctx.fillStyle = hexToRgba(theme.floor, 0.92);
      ctx.shadowColor = hexToRgba(theme.accent, 0.22);
      ctx.shadowBlur = 22;
      roundRect(ctx, b.left, b.top, b.right - b.left, b.bottom - b.top, 22);
      ctx.fill();
      ctx.shadowBlur = 0;

      const vignette = ctx.createRadialGradient((b.left + b.right) / 2, b.top + 80, 20, (b.left + b.right) / 2, (b.top + b.bottom) / 2, Math.max(b.right - b.left, b.bottom - b.top) * 0.78);
      vignette.addColorStop(0, hexToRgba(theme.accent, 0.07));
      vignette.addColorStop(0.8, 'rgba(0,0,0,0.08)');
      vignette.addColorStop(1, 'rgba(0,0,0,0.34)');
      ctx.fillStyle = vignette;
      roundRect(ctx, b.left, b.top, b.right - b.left, b.bottom - b.top, 22);
      ctx.fill();

      ctx.strokeStyle = hexToRgba(theme.grid, 0.32);
      ctx.lineWidth = 1;
      for (let x = b.left; x <= b.right; x += 34) {
        ctx.beginPath();
        ctx.moveTo(x, b.top);
        ctx.lineTo(x, b.bottom);
        ctx.stroke();
      }
      for (let y = b.top; y <= b.bottom; y += 34) {
        ctx.beginPath();
        ctx.moveTo(b.left, y);
        ctx.lineTo(b.right, y);
        ctx.stroke();
      }
      drawThemeMotifs(theme, b);
      ctx.strokeStyle = hexToRgba(theme.accent, 0.55);
      ctx.lineWidth = 2.25;
      roundRect(ctx, b.left, b.top, b.right - b.left, b.bottom - b.top, 22);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.13)';
      ctx.lineWidth = 1;
      roundRect(ctx, b.left + 4, b.top + 4, b.right - b.left - 8, b.bottom - b.top - 8, 18);
      ctx.stroke();

      for (const ob of game.room.obstacles) drawObstacle(ob);
      drawExit();
      ctx.restore();
    }

    function drawThemeMotifs(theme, b) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = hexToRgba(theme.accent2 || theme.accent, 0.55);
      ctx.fillStyle = hexToRgba(theme.accent, 0.18);
      const t = performance.now() * 0.001;
      const count = 7;
      for (let i = 0; i < count; i++) {
        const x = b.left + 42 + ((i * 113) % Math.max(80, b.right - b.left - 84));
        const y = b.top + 54 + ((i * 171) % Math.max(100, b.bottom - b.top - 108));
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((i * 0.7) + Math.sin(t * 0.12 + i) * 0.04);
        if (theme.motif === 'pencil') {
          roundRect(ctx, -18, -3, 36, 6, 3);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(22, 0);
          ctx.lineTo(14, -5);
          ctx.lineTo(14, 5);
          ctx.closePath();
          ctx.fill();
        } else if (theme.motif === 'notebook') {
          ctx.strokeRect(-18, -13, 36, 26);
          ctx.beginPath();
          ctx.moveTo(-12, -6);
          ctx.lineTo(14, -6);
          ctx.moveTo(-12, 2);
          ctx.lineTo(12, 2);
          ctx.moveTo(-12, 10);
          ctx.lineTo(8, 10);
          ctx.stroke();
        } else if (theme.motif === 'calculator') {
          roundRect(ctx, -14, -14, 28, 28, 5);
          ctx.stroke();
          for (let yy = -5; yy <= 8; yy += 8) for (let xx = -6; xx <= 8; xx += 8) ctx.fillRect(xx, yy, 3, 3);
        } else if (theme.motif === 'cafeteria') {
          ctx.beginPath();
          ctx.ellipse(0, 0, 20, 10, 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(-7, -3, 3, 0, Math.PI * 2);
          ctx.arc(8, 2, 4, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, 18, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-10, -4);
          ctx.lineTo(12, 5);
          ctx.stroke();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    function drawObstacle(ob) {
      const theme = game.room.theme;
      ctx.save();
      ctx.translate(ob.x, ob.y);
      ctx.shadowColor = 'rgba(0,0,0,0.38)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 6;
      const grad = ctx.createLinearGradient(0, 0, ob.w, ob.h);
      grad.addColorStop(0, hexToRgba(theme.obstacle, 0.98));
      grad.addColorStop(0.52, hexToRgba(theme.accent, 0.16));
      grad.addColorStop(1, 'rgba(6,10,18,0.72)');
      ctx.fillStyle = grad;
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1;
      roundRect(ctx, 0, 0, ob.w, ob.h, 12);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      if (ob.kind === 0) {
        for (let i = 9; i < ob.w - 8; i += 14) {
          roundRect(ctx, i, 7, 3, ob.h - 14, 2);
          ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,213,110,0.28)';
        ctx.beginPath();
        ctx.moveTo(ob.w - 14, ob.h * 0.5);
        ctx.lineTo(ob.w - 4, ob.h * 0.5 - 5);
        ctx.lineTo(ob.w - 4, ob.h * 0.5 + 5);
        ctx.closePath();
        ctx.fill();
      } else if (ob.kind === 1) {
        for (let y = 10; y < ob.h - 8; y += 10) {
          roundRect(ctx, 8, y, ob.w - 16, 2, 1);
          ctx.fill();
        }
      } else if (ob.kind === 2) {
        ctx.beginPath();
        ctx.arc(ob.w * 0.35, ob.h * 0.45, Math.min(ob.w, ob.h) * 0.18, 0, Math.PI * 2);
        ctx.arc(ob.w * 0.65, ob.h * 0.55, Math.min(ob.w, ob.h) * 0.15, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.beginPath();
        for (let y = 9; y < ob.h; y += 9) {
          ctx.moveTo(9, y);
          ctx.lineTo(ob.w - 10 - (y % 3), y + 2);
        }
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      roundRect(ctx, 7, 5, ob.w * 0.42, 3, 2);
      ctx.fill();
      ctx.restore();
    }

    function drawExit() {
      const ex = game.room.exit;
      const open = game.room.cleared;
      ctx.save();
      ctx.translate(ex.x, ex.y - ex.h / 2);
      const theme = currentTheme();
      ctx.shadowColor = open ? hexToRgba(theme.accent, 0.46) : 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = open ? 22 : 8;
      const doorGrad = ctx.createLinearGradient(0, 0, ex.w, ex.h);
      doorGrad.addColorStop(0, open ? hexToRgba(theme.accent, 0.32) : 'rgba(255,255,255,0.08)');
      doorGrad.addColorStop(1, open ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.32)');
      ctx.fillStyle = doorGrad;
      ctx.strokeStyle = open ? theme.accent : 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      roundRect(ctx, 0, 0, ex.w, ex.h, 13);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.stroke();
      if (open) {
        ctx.fillStyle = hexToRgba(theme.accent, 0.78);
        const pulse = 0.55 + Math.sin(performance.now() * 0.006) * 0.18;
        roundRect(ctx, 7, 10, 5 + pulse * 8, ex.h - 20, 6);
        ctx.fill();
        ctx.strokeStyle = hexToRgba(theme.accent2 || theme.accent, 0.36);
        ctx.beginPath();
        ctx.arc(ex.w * 0.5, ex.h * 0.5, 26 + pulse * 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.font = '800 10px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f5fbff';
        ctx.shadowColor = hexToRgba(theme.accent, 0.65);
        ctx.shadowBlur = 8;
        ctx.fillText('ENTER', ex.w * 0.5, -8);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(ctx, 8, 12, 10, ex.h - 24, 5);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPuddles() {
      for (const p of game.puddles) {
        const a = 0.28 * (p.life / p.maxLife);
        ctx.fillStyle = `rgba(102, 245, 166, ${a})`;
        ctx.shadowColor = 'rgba(102,245,166,0.35)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.r * 1.15, p.r * 0.72, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = `rgba(255,255,255,${a * 0.65})`;
        ctx.beginPath();
        ctx.arc(p.x - p.r * 0.28, p.y - p.r * 0.1, p.r * 0.12, 0, Math.PI * 2);
        ctx.arc(p.x + p.r * 0.18, p.y + p.r * 0.05, p.r * 0.09, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawTraps() {
      for (const t of game.room.traps) {
        if (t.type === 'spike') {
          ctx.save();
          ctx.shadowColor = t.active ? 'rgba(255,93,122,0.52)' : 'rgba(0,0,0,0.2)';
          ctx.shadowBlur = t.active ? 15 : 4;
          ctx.fillStyle = t.active ? '#ff5d7a' : 'rgba(255,255,255,0.2)';
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(t.x - 18 + i * 12, t.y + 11);
            ctx.lineTo(t.x - 12 + i * 12, t.y - 12);
            ctx.lineTo(t.x - 6 + i * 12, t.y + 11);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        } else if (t.type === 'book') {
          const phase = (t.timer % t.period) / t.period;
          ctx.strokeStyle = t.active ? '#ff6b82' : `rgba(168,200,255,${0.22 + phase * 0.48})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
          ctx.stroke();
          if (t.active) {
            ctx.save();
            ctx.translate(t.x, t.y);
            ctx.rotate(Math.sin(phase * Math.PI * 2) * 0.08);
            ctx.fillStyle = '#a8c8ff';
            ctx.shadowColor = 'rgba(168,200,255,0.5)';
            ctx.shadowBlur = 14;
            roundRect(ctx, -17, -12, 34, 24, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(12,24,42,0.35)';
            ctx.fillRect(-2, -10, 2, 20);
            ctx.restore();
          }
        } else {
          drawPaperPlane(t.x, t.y, Math.atan2(t.vy, t.vx), '#f8fbff', 0.72);
        }
      }
    }

    function drawCoins() {
      for (const c of game.room.coins) {
        const pulse = 1 + Math.sin(c.life * 8) * 0.08;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.scale(pulse, pulse);
        ctx.shadowColor = 'rgba(255,212,93,0.5)';
        ctx.shadowBlur = 14;
        const grad = ctx.createRadialGradient(-2, -3, 1, 0, 0, c.r + 3);
        grad.addColorStop(0, '#fff6b0');
        grad.addColorStop(0.48, '#ffd45d');
        grad.addColorStop(1, '#bd7d17');
        ctx.fillStyle = grad;
        ctx.strokeStyle = 'rgba(255,255,255,0.62)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(107,68,10,0.32)';
        ctx.beginPath();
        ctx.arc(0, 0, c.r * 0.52, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawProjectiles() {
      for (const p of game.projectiles) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(Math.atan2(p.vy, p.vx));
        ctx.shadowColor = p.color;
        ctx.shadowBlur = p.friendly ? 10 : 8;
        ctx.fillStyle = p.color;
        if (p.kind === 'pencil') {
          roundRect(ctx, -10, -2.5, 18, 5, 2.5);
          ctx.fill();
          ctx.fillStyle = '#ffe0a8';
          ctx.beginPath();
          ctx.moveTo(10, 0);
          ctx.lineTo(16, -3);
          ctx.lineTo(16, 3);
          ctx.closePath();
          ctx.fill();
        } else if (p.kind === 'chalk') {
          roundRect(ctx, -9, -3, 18, 6, 3);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.fillRect(-5, -2, 8, 1);
        } else if (p.kind === 'number') {
          ctx.font = 'bold 12px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText(String((Math.floor(p.x + p.y) % 9) + 1), 0, 4);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawEnemies() {
      for (const e of game.room.enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);
        const hpPct = clamp(e.hp / e.maxHp, 0, 1);
        const flash = e.hurt > 0;
        ctx.shadowColor = flash ? 'rgba(255,255,255,0.85)' : hexToRgba(e.color, e.boss ? 0.5 : 0.24);
        ctx.shadowBlur = flash ? 20 : e.boss ? 26 : 12;
        drawShadowEllipse(0, e.r + 7, e.r * 1.4, e.r * 0.34, e.boss ? 0.36 : 0.25);
        if (e.type === 'plane') drawEnemyPlane(e, flash);
        else if (e.type === 'snake') drawEnemySnake(e, flash);
        else if (e.boss) drawEnemyTeacher(e, flash);
        else if (e.type === 'bot') drawEnemyBot(e, flash);
        else if (e.type === 'slime') drawEnemySlime(e, flash);
        else if (e.type === 'glue') drawEnemyGlue(e, flash);
        else drawEnemyRat(e, flash);
        if (!e.boss) {
          ctx.fillStyle = 'rgba(0,0,0,0.44)';
          roundRect(ctx, -e.r, -e.r - 14, e.r * 2, 5, 3);
          ctx.fill();
          ctx.fillStyle = hpPct > 0.5 ? '#68f5a6' : hpPct > 0.25 ? '#ffcf4a' : '#ff4d6d';
          roundRect(ctx, -e.r, -e.r - 14, e.r * 2 * hpPct, 5, 3);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawEnemyRat(e, flash) {
      const body = flash ? '#ffffff' : (e.elite ? '#ffcf4a' : '#ff647e');
      ctx.rotate(Math.atan2(game.player.y - e.y, game.player.x - e.x) * 0.08);
      ctx.fillStyle = body;
      roundRect(ctx, -e.r * 1.05, -e.r * 0.65, e.r * 2.15, e.r * 1.32, 8);
      ctx.fill();
      ctx.fillStyle = '#f7d36a';
      roundRect(ctx, -e.r * 0.7, -e.r * 0.48, e.r * 1.35, e.r * 0.28, 3);
      ctx.fill();
      ctx.fillStyle = '#3b2417';
      ctx.beginPath();
      ctx.moveTo(e.r * 1.08, 0);
      ctx.lineTo(e.r * 1.55, -5);
      ctx.lineTo(e.r * 1.55, 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#0b1220';
      ctx.beginPath();
      ctx.arc(e.r * 0.46, -3, 2.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-e.r * 0.75, e.r * 0.35);
      ctx.quadraticCurveTo(-e.r * 1.25, e.r * 0.45, -e.r * 1.45, e.r * 0.1);
      ctx.stroke();
    }

    function drawEnemySlime(e, flash) {
      const wobble = Math.sin(performance.now() * 0.006 + e.x) * 2;
      ctx.fillStyle = flash ? '#ffffff' : (e.elite ? '#ffd06a' : '#b884ff');
      ctx.beginPath();
      ctx.ellipse(0, 4, e.r * 1.18, e.r * 0.82 + wobble * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.24)';
      roundRect(ctx, -e.r * 0.72, -e.r * 0.35, e.r * 1.44, e.r * 0.42, 5);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.beginPath();
      ctx.arc(-5, -4, 3, 0, Math.PI * 2);
      ctx.arc(7, -3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1230';
      ctx.fillRect(-6, -4, 2, 2);
      ctx.fillRect(6, -3, 2, 2);
    }

    function drawEnemyGlue(e, flash) {
      ctx.fillStyle = flash ? '#ffffff' : (e.elite ? '#ffd06a' : '#77f0bd');
      ctx.beginPath();
      ctx.ellipse(0, 3, e.r * 1.15, e.r * 0.88, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.32)';
      ctx.beginPath();
      ctx.arc(-7, -4, 5, 0, Math.PI * 2);
      ctx.arc(8, 0, 3.5, 0, Math.PI * 2);
      ctx.arc(0, 8, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(11,38,30,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8, 4);
      ctx.quadraticCurveTo(0, 10, 10, 5);
      ctx.stroke();
    }

    function drawEnemyPlane(e, flash) {
      drawPaperPlane(0, 0, Math.atan2(e.vy, e.vx), flash ? '#ffffff' : (e.elite ? '#ffd06a' : '#f8fbff'), e.elite ? 1 : 0.94);
      ctx.strokeStyle = 'rgba(114,166,255,0.45)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-16, -8);
      ctx.lineTo(-28, -13);
      ctx.moveTo(-16, 8);
      ctx.lineTo(-28, 13);
      ctx.stroke();
    }

    function drawEnemyBot(e, flash) {
      ctx.fillStyle = flash ? '#ffffff' : (e.elite ? '#ffd06a' : '#55e0d6');
      roundRect(ctx, -e.r * 0.95, -e.r * 1.05, e.r * 1.9, e.r * 2.1, 6);
      ctx.fill();
      ctx.fillStyle = '#092329';
      roundRect(ctx, -e.r * 0.62, -e.r * 0.62, e.r * 1.24, e.r * 0.62, 4);
      ctx.fill();
      ctx.fillStyle = '#b6fff6';
      ctx.font = 'bold 9px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(String((Math.floor(e.x + e.y) % 9) + 1), 0, -e.r * 0.16);
      ctx.fillStyle = 'rgba(9,35,41,0.42)';
      for (let y = 3; y <= 11; y += 7) {
        for (let x = -7; x <= 7; x += 7) {
          roundRect(ctx, x - 2, y - 2, 4, 4, 1.5);
          ctx.fill();
        }
      }
      ctx.strokeStyle = '#55e0d6';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-e.r * 0.55, -e.r * 1.1);
      ctx.lineTo(-e.r * 0.9, -e.r * 1.45);
      ctx.moveTo(e.r * 0.55, -e.r * 1.1);
      ctx.lineTo(e.r * 0.9, -e.r * 1.45);
      ctx.stroke();
    }

    function drawEnemySnake(e, flash) {
      const angle = Math.atan2(e.vy, e.vx);
      ctx.rotate(angle);
      const color = flash ? '#ffffff' : (e.elite ? '#ffd06a' : '#ffb84a');
      for (let i = 3; i >= -2; i--) {
        const x = i * -e.r * 0.62;
        ctx.fillStyle = color;
        roundRect(ctx, x - e.r * 0.45, -e.r * 0.48, e.r * 0.9, e.r * 0.96, 4);
        ctx.fill();
        ctx.strokeStyle = 'rgba(67,42,7,0.38)';
        ctx.strokeRect(x - e.r * 0.26, -e.r * 0.31, e.r * 0.52, e.r * 0.62);
      }
      ctx.fillStyle = '#fff4cf';
      ctx.beginPath();
      ctx.moveTo(e.r * 1.25, 0);
      ctx.lineTo(e.r * 0.62, -e.r * 0.52);
      ctx.lineTo(e.r * 0.62, e.r * 0.52);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#2b1805';
      ctx.beginPath();
      ctx.arc(e.r * 0.78, -2, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawEnemyTeacher(e, flash) {
      const t = performance.now() * 0.001;
      const body = flash ? '#ffffff' : (e.phase === 2 ? '#ff7c5f' : '#ff4d6d');
      ctx.save();
      ctx.scale(1 + Math.sin(t * 5) * 0.015, 1);
      ctx.fillStyle = body;
      roundRect(ctx, -e.r * 0.9, -e.r * 0.42, e.r * 1.8, e.r * 1.45, 14);
      ctx.fill();
      ctx.fillStyle = '#2b0711';
      roundRect(ctx, -e.r * 0.45, -e.r * 0.1, e.r * 0.9, e.r * 0.55, 6);
      ctx.fill();
      ctx.fillStyle = '#ffd7bd';
      ctx.beginPath();
      ctx.arc(0, -e.r * 0.68, e.r * 0.58, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a1420';
      roundRect(ctx, -e.r * 0.7, -e.r * 1.05, e.r * 1.4, e.r * 0.34, 8);
      ctx.fill();
      ctx.strokeStyle = '#2a0710';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-e.r * 0.28, -e.r * 0.72);
      ctx.lineTo(-e.r * 0.02, -e.r * 0.64);
      ctx.moveTo(e.r * 0.28, -e.r * 0.72);
      ctx.lineTo(e.r * 0.02, -e.r * 0.64);
      ctx.stroke();
      ctx.strokeStyle = '#2a0710';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-e.r * 0.25, -e.r * 0.36);
      ctx.quadraticCurveTo(0, -e.r * 0.22, e.r * 0.25, -e.r * 0.36);
      ctx.stroke();
      ctx.strokeStyle = '#fff0c7';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(e.r * 0.82, 0);
      ctx.lineTo(e.r * 1.42, -e.r * 0.45);
      ctx.stroke();
      ctx.fillStyle = '#f8fbff';
      roundRect(ctx, -e.r * 0.36, e.r * 0.22, e.r * 0.72, e.r * 0.22, 3);
      ctx.fill();
      ctx.restore();
    }

    function drawShadowEllipse(x, y, rx, ry, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPaperPlane(x, y, angle, color, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle || 0);
      ctx.globalAlpha = alpha == null ? 1 : alpha;
      ctx.shadowColor = 'rgba(200,230,255,0.34)';
      ctx.shadowBlur = 8;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(17, 0);
      ctx.lineTo(-15, -11);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-15, 11);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(114,166,255,0.22)';
      ctx.beginPath();
      ctx.moveTo(-6, 0);
      ctx.lineTo(-15, -11);
      ctx.lineTo(-2, -3);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-6, 0);
      ctx.lineTo(17, 0);
      ctx.stroke();
      ctx.restore();
    }

    function drawPlayer() {
      const p = game.player;
      const skin = skins.find(s => s.id === game.save.permanent.selectedSkin) || skins[0];
      const t = performance.now() * 0.001;
      const moving = Math.hypot(p.vx, p.vy) > 24 || Math.hypot(game.input.dirX, game.input.dirY) > 0.1;
      const reduced = game.save && game.save.permanent.settings.reducedMotion;
      const bob = reduced ? 0 : Math.sin(t * (moving ? 13 : 4)) * (moving ? 2.2 : 1.1);
      const step = reduced ? 0 : Math.sin(t * 13) * (moving ? 1 : 0.15);
      const faceAngle = Math.atan2(p.facingY || 0, p.facingX || 1);
      ctx.save();
      ctx.translate(p.x, p.y + bob);
      if (p.invuln > 0 && Math.floor(performance.now() / 70) % 2 === 0) ctx.globalAlpha = 0.6;
      drawShadowEllipse(0, 24, 20, 6, 0.28);
      if (p.blocking) {
        ctx.strokeStyle = 'rgba(143,199,255,0.82)';
        ctx.lineWidth = 4;
        ctx.shadowColor = 'rgba(143,199,255,0.42)';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(0, 0, p.radius + 16, -0.92, Math.PI + 0.92);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      if (p.dashTime > 0) {
        ctx.save();
        ctx.rotate(faceAngle);
        const trail = ctx.createLinearGradient(-42, 0, -6, 0);
        trail.addColorStop(0, 'rgba(56,215,255,0)');
        trail.addColorStop(1, 'rgba(56,215,255,0.42)');
        ctx.fillStyle = trail;
        roundRect(ctx, -46, -13, 42, 26, 13);
        ctx.fill();
        ctx.restore();
      }

      ctx.save();
      ctx.rotate(faceAngle * 0.04);
      ctx.fillStyle = skin.colors[1];
      roundRect(ctx, -23, -7, 15, 27, 7);
      ctx.fill();

      ctx.fillStyle = 'rgba(3,8,16,0.38)';
      roundRect(ctx, -13 + step, 14, 8, 11, 4);
      roundRect(ctx, 5 - step, 14, 8, 11, 4);
      ctx.fill();

      const bodyGrad = ctx.createLinearGradient(0, -16, 0, 20);
      bodyGrad.addColorStop(0, skin.colors[0]);
      bodyGrad.addColorStop(1, skin.colors[1]);
      ctx.fillStyle = bodyGrad;
      ctx.shadowColor = hexToRgba(skin.colors[0], 0.45);
      ctx.shadowBlur = 14;
      roundRect(ctx, -16, -6, 32, 29, 11);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      roundRect(ctx, -10, -2, 20, 4, 3);
      ctx.fill();

      ctx.fillStyle = '#ffd7bd';
      ctx.beginPath();
      ctx.arc(0, -17, 13.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = skin.colors[2];
      roundRect(ctx, -12, -26, 24, 10, 7);
      ctx.fill();
      ctx.fillStyle = 'rgba(4,10,18,0.72)';
      roundRect(ctx, -8 + p.facingX * 2, -18 + p.facingY, 16, 5, 3);
      ctx.fill();

      ctx.save();
      ctx.rotate(faceAngle);
      ctx.fillStyle = skin.colors[2];
      ctx.shadowColor = hexToRgba(skin.colors[2], 0.35);
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(24, 0);
      ctx.lineTo(11, -7);
      ctx.lineTo(11, 7);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.restore();
      ctx.restore();
    }

    function drawEffects() {
      for (const fx of game.effects) {
        const pct = clamp(fx.life / fx.maxLife, 0, 1);
        ctx.save();
        ctx.globalAlpha = pct;
        if (fx.type === 'slash') {
          ctx.translate(fx.x, fx.y);
          ctx.rotate(fx.angle);
          const grad = ctx.createLinearGradient(-fx.radius, 0, fx.radius, 0);
          grad.addColorStop(0, 'rgba(255,255,255,0)');
          grad.addColorStop(0.45, fx.color);
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.strokeStyle = grad;
          ctx.lineWidth = fx.wide ? 9 : 6;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.arc(0, 0, fx.radius, -0.78, 0.78);
          ctx.stroke();
        } else if (fx.type === 'ring') {
          const grow = 1 + (1 - pct) * 0.38;
          ctx.strokeStyle = fx.color;
          ctx.lineWidth = 2 + pct * 5;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, fx.radius * grow, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }
      if (game.view.roomFlash > 0) {
        ctx.save();
        ctx.globalAlpha = game.view.roomFlash * 0.12;
        ctx.fillStyle = currentTheme().accent;
        ctx.fillRect(game.bounds.left, game.bounds.top, game.bounds.right - game.bounds.left, game.bounds.bottom - game.bounds.top);
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of game.particles) {
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawNumbers() {
      ctx.textAlign = 'center';
      ctx.font = 'bold 14px system-ui, sans-serif';
      for (const n of game.numbers) {
        ctx.globalAlpha = clamp(n.life / n.maxLife, 0, 1);
        ctx.fillStyle = n.color;
        ctx.fillText(n.text, n.x, n.y);
      }
      ctx.globalAlpha = 1;
    }

    function drawDarkness() {
      const p = game.player;
      ctx.save();
      const grad = ctx.createRadialGradient(p.x, p.y, 70, p.x, p.y, 245);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.6, 'rgba(0,0,0,0.58)');
      grad.addColorStop(1, 'rgba(0,0,0,0.84)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, game.view.w, game.view.h);
      ctx.restore();
    }

    function roundRect(c, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace('#', '');
      const num = parseInt(clean, 16);
      const r = (num >> 16) & 255;
      const g = (num >> 8) & 255;
      const b = num & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function updateHud() {
      if (!game.player || !game.room) return;
      const p = game.player;
      hudEls.room.textContent = 'Room ' + game.roomNumber;
      hudEls.theme.textContent = game.room.theme.name;
      hudEls.coins.textContent = p.coins;
      hudEls.hp.textContent = Math.max(0, Math.ceil(p.hp)) + ' / ' + p.maxHp + ' HP';
      const hpTarget = clamp(p.hp / p.maxHp, 0, 1);
      game.view.hpShown += (hpTarget - game.view.hpShown) * 0.16;
      if (Math.abs(game.view.hpShown - hpTarget) < 0.003) game.view.hpShown = hpTarget;
      hudEls.hpFill.style.width = clamp(game.view.hpShown * 100, 0, 100) + '%';
      const modText = game.room.cleared && game.room.exit.open ? 'Door Open • Next: ' + game.room.nextPreview : game.room.modifier ? game.room.modifier.name : capitalize(game.room.type) + ' Room';
      hudEls.mod.textContent = game.quizTimer > 0 ? modText + ' ' + Math.ceil(game.quizTimer) + 's' : modText;

      const boss = game.room.enemies.find(e => e.boss);
      if (boss) {
        const pct = clamp(boss.hp / boss.maxHp, 0, 1);
        hudEls.bossWrap.style.display = 'block';
        hudEls.bossName.textContent = boss.phase === 2 ? 'Angry Teacher: Phase 2' : 'Angry Teacher';
        hudEls.bossHp.textContent = Math.ceil(pct * 100) + '%';
        hudEls.bossFill.style.width = pct * 100 + '%';
      } else {
        hudEls.bossWrap.style.display = 'none';
      }

      if (game.state === STATES.PLAYING) {
        const ready = p.dashCooldown <= 0;
        const pct = ready ? 100 : (1 - p.dashCooldown / p.dashCooldownBase) * 100;
        dashRing.style.background = `conic-gradient(${ready ? '#32d5ff' : '#31516b'} ${pct}%, rgba(255,255,255,0.12) 0)`;
        dashRing.querySelector('span').textContent = ready ? 'DASH' : Math.ceil(p.dashCooldown * 10) / 10 + 's';
        const shootReady = p.shootCooldown <= 0;
        shootBtn.disabled = !shootReady;
        shootBtn.querySelector('span').textContent = shootReady ? 'SHOOT' : Math.ceil(p.shootCooldown * 10) / 10 + 's';
      }
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch]));
    }

    function setupInput() {
      document.getElementById('pauseBtn').addEventListener('click', showPause);
      shootBtn.addEventListener('pointerdown', e => {
        if (game.state !== STATES.PLAYING) return;
        e.preventDefault();
        startAudio();
        shootPlayerProjectile();
      }, { passive: false });
      window.addEventListener('keydown', e => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Spacebar'].includes(e.key)) e.preventDefault();
        if (e.key === 'Escape') {
          if (game.state === STATES.PLAYING) showPause();
          else if (game.state === STATES.PAUSE) setState(STATES.PLAYING);
          return;
        }
        const key = e.key === ' ' || e.key === 'Spacebar' ? 'space' : e.key.length === 1 ? e.key.toLowerCase() : e.key;
        game.input.keys[key] = true;
        if (game.state === STATES.PLAYING && key === 'space' && !e.repeat) {
          const target = nearestEnemyInRange(game.player.attackRange + 18);
          if (target) performAttack(target);
        }
        if (game.state === STATES.PLAYING && (key === 'f' || key === 'e') && !e.repeat) shootPlayerProjectile();
        if (game.state === STATES.PLAYING && (key === 'Shift' || key === 'shift') && !e.repeat) dash();
        if (key === 'b') game.input.block = true;
      }, { passive: false });

      window.addEventListener('keyup', e => {
        const key = e.key === ' ' || e.key === 'Spacebar' ? 'space' : e.key.length === 1 ? e.key.toLowerCase() : e.key;
        game.input.keys[key] = false;
        if (key === 'b') game.input.block = false;
      });

      canvas.addEventListener('pointerdown', e => {
        if (game.state !== STATES.PLAYING) return;
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        startAudio();
        const pos = pointerPos(e);
        game.input.pointerDown = true;
        game.input.pointerId = e.pointerId;
        game.input.startX = pos.x;
        game.input.startY = pos.y;
        game.input.lastX = pos.x;
        game.input.lastY = pos.y;
        game.input.startTime = performance.now();
        game.input.block = false;
        clearTimeout(game.input.holdTimer);
        game.input.holdTimer = setTimeout(() => {
          if (!game.input.pointerDown) return;
          const moved = dist(game.input.startX, game.input.startY, game.input.lastX, game.input.lastY);
          if (moved < 16) game.input.block = true;
        }, 210);
      }, { passive: false });

      canvas.addEventListener('pointermove', e => {
        if (!game.input.pointerDown || e.pointerId !== game.input.pointerId) return;
        e.preventDefault();
        const pos = pointerPos(e);
        game.input.lastX = pos.x;
        game.input.lastY = pos.y;
        const dx = pos.x - game.input.startX;
        const dy = pos.y - game.input.startY;
        const len = Math.hypot(dx, dy);
        if (len > 18) {
          game.input.block = false;
          game.input.touchDirX = dx / len;
          game.input.touchDirY = dy / len;
        }
      }, { passive: false });

      canvas.addEventListener('pointerup', endPointer, { passive: false });
      canvas.addEventListener('pointercancel', endPointer, { passive: false });

      window.addEventListener('blur', () => {
        game.input.keys = Object.create(null);
        game.input.touchDirX = 0;
        game.input.touchDirY = 0;
        game.input.block = false;
        if (game.state === STATES.PLAYING) saveGame();
      });

      document.addEventListener('touchmove', e => {
        if (game.state === STATES.PLAYING || e.target === canvas) e.preventDefault();
      }, { passive: false });
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) saveGame();
        else if (game.audio && game.audio.state === 'suspended' && !game.save.permanent.settings.muted) game.audio.resume().catch(() => {});
      });
      window.addEventListener('pagehide', saveGame);
      window.addEventListener('beforeunload', saveGame);
    }

    function pointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function endPointer(e) {
      if (!game.input.pointerDown || e.pointerId !== game.input.pointerId) return;
      e.preventDefault();
      clearTimeout(game.input.holdTimer);
      const pos = pointerPos(e);
      const moved = dist(game.input.startX, game.input.startY, pos.x, pos.y);
      const held = performance.now() - game.input.startTime;
      const wasBlocking = game.input.block;
      game.input.pointerDown = false;
      game.input.pointerId = null;
      game.input.touchDirX = 0;
      game.input.touchDirY = 0;
      game.input.block = false;
      if (game.state !== STATES.PLAYING) return;
      if (moved < 18 && held < 420 && !wasBlocking) {
        const now = performance.now();
        if (now - game.input.lastTap < 285) {
          const dx = pos.x - game.player.x;
          const dy = pos.y - game.player.y;
          const len = Math.max(1, Math.hypot(dx, dy));
          game.player.facingX = dx / len;
          game.player.facingY = dy / len;
          dash();
          game.input.lastTap = 0;
        } else {
          const picked = tapPickCoin(pos.x, pos.y);
          if (!picked) attackAt(pos.x, pos.y);
          game.input.lastTap = now;
        }
      }
    }

    function tapPickCoin(x, y) {
      for (let i = game.room.coins.length - 1; i >= 0; i--) {
        const c = game.room.coins[i];
        if (dist(x, y, c.x, c.y) < c.r + 24 && dist(game.player.x, game.player.y, c.x, c.y) < 105 + game.player.coinMagnet) {
          collectCoin(i, c);
          return true;
        }
      }
      return false;
    }

    function loop(now) {
      const last = loop.last || now;
      const dt = Math.min(0.033, Math.max(0, (now - last) / 1000));
      loop.last = now;
      if (game.state === STATES.PLAYING) {
        if (game.hitstop > 0) {
          game.hitstop = Math.max(0, game.hitstop - dt);
          updateParticles(dt * 0.35);
          updateEffects(dt * 0.35);
          updateNumbers(dt * 0.35);
        } else {
          update(dt);
        }
      }
      draw();
      requestAnimationFrame(loop);
    }

    function init() {
      loadSave();
      resize();
      setupInput();
      window.addEventListener('resize', resize);
      showMenu();
      requestAnimationFrame(loop);
    }

    init();
  })();
  </script>
</body>
